<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCTS Paper Visualization</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --paper: #ffffff;
            --ink: #18212f;
            --muted: #738196;
            --line: #d5dbe5;
            --line-soft: #e8edf4;
            --panel: rgba(255, 255, 255, 0.94);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            background: var(--paper);
            color: var(--ink);
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        }

        body {
            overflow: auto;
        }

        #page {
            min-height: 100vh;
            padding: 24px;
            background: #ffffff;
        }

        #layout {
            display: flex;
            align-items: flex-start;
            gap: 24px;
        }

        #canvas {
            position: relative;
            display: inline-block;
            background: var(--paper);
            flex: 1 1 auto;
        }

        svg {
            display: block;
            overflow: visible;
            background: transparent;
        }

        .sidebar {
            position: sticky;
            top: 24px;
            width: 240px;
            flex: 0 0 240px;
        }

        .panel {
            border: 1px solid var(--line-soft);
            border-radius: 18px;
            background: var(--panel);
            box-shadow: 0 12px 30px rgba(24, 33, 47, 0.06);
        }

        .brand {
            margin-bottom: 16px;
            padding: 14px 16px;
        }

        .brand-logo {
            width: 126px;
            height: auto;
            display: block;
        }

        .controls {
            padding: 18px 16px;
        }

        .controls-title {
            margin: 0 0 14px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .control {
            margin-top: 14px;
        }

        .control:first-of-type {
            margin-top: 0;
        }

        .control-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 6px;
        }

        .control-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--ink);
        }

        .control-value {
            font-size: 12px;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
        }

        .control input[type="range"] {
            width: 100%;
            margin: 0;
            accent-color: #2d8c7a;
        }

        .link {
            fill: none;
            stroke: var(--line);
            stroke-width: 1.35px;
            stroke-linecap: round;
            opacity: 0.95;
        }

        .node rect {
            stroke: rgba(24, 33, 47, 0.12);
            stroke-width: 1px;
            shape-rendering: geometricPrecision;
        }

        .node.node-virtual-root rect {
            fill: #c5ccd8;
            stroke: rgba(24, 33, 47, 0.18);
        }

        .legend {
            margin-top: 16px;
            min-width: 100%;
            padding: 10px 12px 11px;
        }

        .legend[hidden] {
            display: none;
        }

        .legend-title {
            margin: 0 0 7px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .legend-bar {
            height: 10px;
            border-radius: 999px;
            border: 1px solid rgba(24, 33, 47, 0.08);
        }

        .legend-range {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-top: 6px;
            font-size: 11px;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
        }

        .legend-control {
            margin-top: 12px;
        }

        .status {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            color: var(--muted);
        }

        .status strong {
            display: block;
            margin-bottom: 8px;
            color: var(--ink);
            font-size: 16px;
        }

        @media (max-width: 900px) {
            #layout {
                flex-direction: column;
            }

            .sidebar {
                position: static;
                width: 100%;
                flex-basis: auto;
            }
        }
    </style>
</head>
<body>
    <div id="page">
        <div id="layout">
            <div id="canvas">
                <svg id="chart" aria-label="Compact MCTS tree"></svg>
            </div>
            <aside class="sidebar">
                <div class="panel brand">
                    <img class="brand-logo" src="GenBio-logo.png" alt="GenBio AI logo">
                </div>
                <div class="panel controls">
                    <p class="controls-title">Layout Controls</p>
                    <div class="control">
                        <div class="control-head">
                            <label class="control-label" for="vertical-gap">Vertical Distance</label>
                            <span class="control-value" id="vertical-gap-value"></span>
                        </div>
                        <input id="vertical-gap" type="range" min="9" max="28" step="1" value="13">
                    </div>
                    <div class="control">
                        <div class="control-head">
                            <label class="control-label" for="horizontal-gap">Horizontal Distance</label>
                            <span class="control-value" id="horizontal-gap-value"></span>
                        </div>
                        <input id="horizontal-gap" type="range" min="15" max="72" step="1" value="40">
                    </div>
                    <div class="control">
                        <div class="control-head">
                            <label class="control-label" for="node-size">Node Size</label>
                            <span class="control-value" id="node-size-value"></span>
                        </div>
                        <input id="node-size" type="range" min="6" max="18" step="1" value="10">
                    </div>
                </div>
                <div id="legend" class="legend panel" hidden>
                    <p class="legend-title">Score</p>
                    <div class="legend-bar" id="legend-bar"></div>
                    <div class="legend-range">
                        <span id="legend-min"></span>
                        <span id="legend-max"></span>
                    </div>
                    <div class="legend-control control">
                        <div class="control-head">
                            <label class="control-label" for="score-min">Color Min</label>
                            <span class="control-value" id="score-min-value"></span>
                        </div>
                        <input id="score-min" type="range">
                    </div>
                    <div class="legend-control control">
                        <div class="control-head">
                            <label class="control-label" for="score-max">Color Max</label>
                            <span class="control-value" id="score-max-value"></span>
                        </div>
                        <input id="score-max" type="range">
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const CONFIG = {
            margin: { top: 22, right: 28, bottom: 28, left: 22 },
            palette: ['#d94841', '#ef8d49', '#f0ca63', '#87c77a', '#1f8a70']
        };
        const state = {
            data: null,
            verticalGap: 13,
            horizontalGap: 40,
            nodeSize: 10,
            scoreFloor: null,
            scoreCeiling: null,
            scoreMinBound: null,
            scoreMaxBound: null,
            scoreStep: 0.001
        };

        function sanitizeTree(nodes) {
            if (!Array.isArray(nodes)) {
                return [];
            }

            return nodes
                .filter((node) => node && typeof node === 'object' && node.name)
                .map((node) => ({
                    name: String(node.name),
                    score: Number.isFinite(Number(node.score)) ? Number(node.score) : null,
                    children: sanitizeTree(node.children)
                }));
        }

        function formatScore(score) {
            return Number.isFinite(Number(score)) ? Number(score).toFixed(3) : 'N/A';
        }

        function countNodes(roots) {
            let total = 0;
            const walk = (node) => {
                total += 1;
                (node.children || []).forEach((child) => walk(child));
            };
            roots.forEach((root) => walk(root));
            return total;
        }

        function createScoreColor(minScore, maxScore, direction) {
            const interpolate = d3.interpolateRgbBasis(CONFIG.palette);
            const numericRange = maxScore - minScore;

            return (score) => {
                if (score === null || score === undefined) {
                    return '#cfd8e3';
                }

                const raw = numericRange > 0 ? (score - minScore) / numericRange : 0.5;
                const clamped = Math.max(0, Math.min(1, raw));
                const normalized = direction === 'minimize' ? 1 - clamped : clamped;
                return interpolate(normalized);
            };
        }

        function buildLegend(scoreToColor, minScore, maxScore) {
            const steps = 8;
            const gradientStops = [];
            const range = maxScore - minScore;

            for (let index = 0; index <= steps; index += 1) {
                const t = index / steps;
                const score = range > 0 ? minScore + (range * t) : minScore;
                gradientStops.push(`${scoreToColor(score)} ${Math.round(t * 100)}%`);
            }

            document.getElementById('legend-bar').style.background = `linear-gradient(90deg, ${gradientStops.join(', ')})`;
            document.getElementById('legend-min').textContent = formatScore(minScore);
            document.getElementById('legend-max').textContent = formatScore(maxScore);
            document.getElementById('legend').hidden = false;
        }

        function updateControlLabels() {
            document.getElementById('vertical-gap-value').textContent = `${state.verticalGap}px`;
            document.getElementById('horizontal-gap-value').textContent = `${state.horizontalGap}px`;
            document.getElementById('node-size-value').textContent = `${state.nodeSize}px`;
            document.getElementById('score-min-value').textContent = formatScore(state.scoreFloor);
            document.getElementById('score-max-value').textContent = formatScore(state.scoreCeiling);
        }

        function render() {
            const data = state.data;
            const roots = sanitizeTree(data.tree);
            if (!roots.length) {
                throw new Error('Tree data is empty.');
            }

            const totalNodes = countNodes(roots);
            const colorMin = Math.min(state.scoreFloor, state.scoreCeiling);
            const colorMax = Math.max(state.scoreFloor, state.scoreCeiling);
            const scoreToColor = createScoreColor(colorMin, colorMax, data.score_direction);

            const hierarchy = d3.hierarchy({ name: '__paper_root__', children: roots });
            d3.tree()
                .nodeSize([state.verticalGap, state.horizontalGap])
                .separation((left, right) => (left.parent === right.parent ? 1 : 1.08))(hierarchy);

            let offset = 0;
            const topRoots = hierarchy.children || [];
            topRoots.forEach((topNode, index) => {
                const descendants = topNode.descendants();
                const localMin = d3.min(descendants, (node) => node.x);
                const localMax = d3.max(descendants, (node) => node.x);
                const shift = offset - localMin;
                descendants.forEach((node) => {
                    node.x += shift;
                });
                const groupGap = Math.max(12, Math.round(state.verticalGap * 1.35));
                offset += (localMax - localMin) + groupGap + (index === topRoots.length - 1 ? 0 : Math.round(state.verticalGap * 0.45));
            });

            if (topRoots.length) {
                const topRootMin = d3.min(topRoots, (node) => node.x);
                const topRootMax = d3.max(topRoots, (node) => node.x);
                hierarchy.x = (topRootMin + topRootMax) / 2;
            }

            const nodes = hierarchy.descendants();
            const links = hierarchy.links();

            nodes.forEach((node) => {
                node.plotY = node.depth * state.horizontalGap;
            });

            const minX = d3.min(nodes, (node) => node.x);
            const maxX = d3.max(nodes, (node) => node.x);
            const maxY = d3.max(nodes, (node) => node.plotY);

            const width = maxY + CONFIG.margin.left + CONFIG.margin.right + state.nodeSize;
            const height = (maxX - minX) + CONFIG.margin.top + CONFIG.margin.bottom + state.nodeSize;

            const svg = d3.select('#chart')
                .attr('width', width)
                .attr('height', height)
                .attr('viewBox', `0 0 ${width} ${height}`);

            svg.selectAll('*').remove();

            const frame = svg.append('g')
                .attr('transform', `translate(${CONFIG.margin.left}, ${CONFIG.margin.top - minX})`);

            const linkPath = d3.linkHorizontal()
                .x((node) => node.plotY)
                .y((node) => node.x);

            frame.append('g')
                .selectAll('path')
                .data(links)
                .join('path')
                .attr('class', 'link')
                .attr('d', linkPath);

            frame.append('g')
                .selectAll('g')
                .data(nodes)
                .join('g')
                .attr('class', (node) => node.depth === 0 ? 'node node-virtual-root' : 'node')
                .attr('transform', (node) => `translate(${node.plotY}, ${node.x})`)
                .append('rect')
                .attr('x', -state.nodeSize / 2)
                .attr('y', -state.nodeSize / 2)
                .attr('width', state.nodeSize)
                .attr('height', state.nodeSize)
                .attr('rx', Math.max(2.5, state.nodeSize * 0.28))
                .attr('ry', Math.max(2.5, state.nodeSize * 0.28))
                .attr('fill', (node) => node.depth === 0 ? '#c5ccd8' : scoreToColor(node.data.score));

            document.title = `MCTS Paper Visualization (${totalNodes} nodes)`;
            buildLegend(scoreToColor, colorMin, colorMax);
        }

        function bindControls() {
            const verticalGapInput = document.getElementById('vertical-gap');
            const horizontalGapInput = document.getElementById('horizontal-gap');
            const nodeSizeInput = document.getElementById('node-size');
            const scoreMinInput = document.getElementById('score-min');
            const scoreMaxInput = document.getElementById('score-max');

            verticalGapInput.addEventListener('input', () => {
                state.verticalGap = Number(verticalGapInput.value);
                updateControlLabels();
                render();
            });

            horizontalGapInput.addEventListener('input', () => {
                state.horizontalGap = Number(horizontalGapInput.value);
                updateControlLabels();
                render();
            });

            nodeSizeInput.addEventListener('input', () => {
                state.nodeSize = Number(nodeSizeInput.value);
                updateControlLabels();
                render();
            });

            scoreMinInput.addEventListener('input', () => {
                const nextValue = Number(scoreMinInput.value);
                state.scoreFloor = Math.min(nextValue, state.scoreCeiling);
                if (state.scoreFloor !== nextValue) {
                    scoreMinInput.value = String(state.scoreFloor);
                }
                updateControlLabels();
                render();
            });

            scoreMaxInput.addEventListener('input', () => {
                const nextValue = Number(scoreMaxInput.value);
                state.scoreCeiling = Math.max(nextValue, state.scoreFloor);
                if (state.scoreCeiling !== nextValue) {
                    scoreMaxInput.value = String(state.scoreCeiling);
                }
                updateControlLabels();
                render();
            });

            updateControlLabels();
        }

        function initializeScoreControls(data) {
            const scoreMinInput = document.getElementById('score-min');
            const scoreMaxInput = document.getElementById('score-max');
            const dataMinScore = Number.isFinite(Number(data.min_score)) ? Number(data.min_score) : 0;
            const dataMaxScore = Number.isFinite(Number(data.max_score)) ? Number(data.max_score) : 1;
            const derivedStep = Math.abs(dataMaxScore - dataMinScore) > 0
                ? Math.max(0.0001, Math.abs(dataMaxScore - dataMinScore) / 500)
                : 0.0001;

            state.scoreMinBound = dataMinScore;
            state.scoreMaxBound = dataMaxScore;
            state.scoreFloor = dataMinScore;
            state.scoreCeiling = dataMaxScore;
            state.scoreStep = derivedStep;

            for (const input of [scoreMinInput, scoreMaxInput]) {
                input.min = String(dataMinScore);
                input.max = String(dataMaxScore);
                input.step = String(derivedStep);
            }

            scoreMinInput.value = String(dataMinScore);
            scoreMaxInput.value = String(dataMaxScore);
        }

        function showError(message) {
            document.body.innerHTML = `
                <div class="status">
                    <div>
                        <strong>Failed to load MCTS tree</strong>
                        <div>${message}</div>
                    </div>
                </div>
            `;
        }

        async function main() {
            try {
                const pageUrl = new URL(window.location.href);
                const baseUrl = /\/(compact|paper)\/?$/.test(pageUrl.pathname)
                    ? new URL(`${pageUrl.href}/`)
                    : pageUrl;
                const response = await fetch(new URL('mcts_data.json', baseUrl), { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                state.data = await response.json();
                initializeScoreControls(state.data);
                bindControls();
                render();
            } catch (error) {
                console.error(error);
                showError(error.message || 'Unknown error');
            }
        }

        main();
    </script>
</body>
</html>
